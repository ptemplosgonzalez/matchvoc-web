<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchVoc — Acceso Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A365D;
    --navy-light: #2A4A7F;
    --navy-dark: #0F2040;
    --white: #FFFFFF;
    --pearl: #F7FAFC;
    --gray: #E2E8F0;
    --gray-mid: #94A3B8;
    --red: #E53E3E;
    --accent: #3B82F6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    font-family: 'DM Sans', sans-serif;
    background: var(--navy-dark);
    overflow: hidden;
  }

  .left-panel {
    width: 55%;
    background: var(--navy);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
    overflow: hidden;
  }

  .left-panel::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
    top: -100px; right: -100px;
  }

  .left-panel::after {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
    bottom: -80px; left: -80px;
  }

  .brand { position: relative; z-index: 1; }

  .brand-logo {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 60px;
  }

  .logo-icon {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--white);
    letter-spacing: -0.5px;
  }

  .brand h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 20px;
    letter-spacing: -1px;
  }

  .brand h1 em { font-style: italic; color: #93C5FD; }

  .brand p {
    font-size: 17px;
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    max-width: 380px;
  }

  .right-panel {
    width: 45%;
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 50px;
  }

  .login-box { width: 100%; max-width: 380px; }

  .login-box h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--navy-dark);
    margin-bottom: 8px;
  }

  .login-box .subtitle { font-size: 15px; color: var(--gray-mid); margin-bottom: 40px; }

  .field { margin-bottom: 20px; }

  .field label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--gray);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--navy-dark);
    background: var(--pearl);
    transition: all 0.2s;
    outline: none;
  }

  .field input:focus {
    border-color: var(--accent);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }

  .error-msg {
    display: none;
    background: #FEF2F2;
    border: 1px solid #FECACA;
    color: var(--red);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
  }
  .error-msg.visible { display: block; }

  .btn-login {
    width: 100%;
    padding: 15px;
    background: var(--navy);
    color: var(--white);
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .btn-login:hover { background: var(--navy-light); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(26,54,93,0.3); }
  .btn-login:active { transform: translateY(0); }
  .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

  .btn-login .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }

  .btn-login.loading .btn-text { display: none; }
  .btn-login.loading .spinner  { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .login-footer { text-align: center; margin-top: 30px; font-size: 13px; color: var(--gray-mid); }

  .left-panel .brand { animation: fadeUp 0.7s ease both; }
  .right-panel { animation: fadeIn 0.5s ease both; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<div class="left-panel">
  <div class="brand">
    <div class="brand-logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" fill="white" stroke="white"/>
        </svg>
      </div>
      <span class="logo-text">MatchVoc</span>
    </div>
    <h1>Panel de <em>Administración</em></h1>
    <p>Gestiona alumnos, tarjetas vocacionales, universidades y analiza los resultados del test.</p>
  </div>
</div>

<div class="right-panel">
  <div class="login-box">
    <h2>Bienvenido</h2>
    <p class="subtitle">Ingresa con tu cuenta de administrador</p>

    <div class="error-msg" id="errorMsg"></div>

    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="correo" placeholder="admin@matchvoc.com" autocomplete="email">
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btnLogin" onclick="login()">
      <span class="btn-text">Iniciar sesión</span>
      <div class="spinner"></div>
    </button>

    <p class="login-footer">MatchVoc © 2024 — Sistema de orientación vocacional</p>
  </div>
</div>

<script>
  const API = 'https://matchvoc-backend-production.up.railway.app';
  if (localStorage.getItem('mv_token')) window.location.href = 'dashboard.html';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const correo   = document.getElementById('correo').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.classList.remove('visible');

    if (!correo || !password) {
      errorMsg.textContent = 'Por favor completa todos los campos';
      errorMsg.classList.add('visible');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      const res  = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ correo, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al iniciar sesión');
      if (data.role !== 'admin') throw new Error('No tienes permisos de administrador');

      localStorage.setItem('mv_token',  data.token);
      localStorage.setItem('mv_userId', data.userId);
      localStorage.setItem('mv_nombre', data.nombre);
      localStorage.setItem('mv_role',   data.role);
      window.location.href = 'dashboard.html';
    } catch (err) {
      errorMsg.textContent = err.message;
      errorMsg.classList.add('visible');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
